  presetFormat: String
  presetDuration: String
  presetPlatformPreset: String
  autoPublish: Boolean
  publishAt: AWSDateTime
  language: String!
  targetDurationSec: Int!
  videoTitle: String!
  youtubePublishTitle: String
  youtubePublishDescription: String
  youtubePublishTags: [String!]
  youtubePublishCategoryId: Int
  youtubePublishDefaultLanguage: String
  retryCount: Int!
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
  sceneJsonS3Key: String
  assetManifestS3Key: String
  renderPlanS3Key: String
  finalVideoS3Key: String
  thumbnailS3Key: String
  previewS3Key: String
  reviewAction: ReviewAction
  reviewRequestedAt: AWSDateTime
  uploadStatus: UploadStatus
  uploadVideoId: String
  contentBriefS3Key: String
  jobBriefS3Key: String
  jobPlanS3Key: String
  approvedPlanExecutionId: String
  approvedSceneExecutionId: String
  approvedAssetExecutionId: String
  defaultVoiceProfileId: String
  backgroundMusicS3Key: String
  masterVideoS3Key: String
  """
  Fargate 프레임 추출 진행 상태. 파이프라인 `status`(JobStatus)와 별개.
  """
  sourceVideoFrameExtractStatus: SourceVideoFrameExtractStatus
  sourceVideoFrameExtractError: String
  sourceVideoFrameExtractStartedAt: AWSDateTime
  sourceVideoFrameExtractCompletedAt: AWSDateTime
