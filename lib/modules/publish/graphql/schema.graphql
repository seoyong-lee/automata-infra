enum ChannelPublishQueueItemStatus {
  QUEUED
  SCHEDULED
  PUBLISHED
  REMOVED
}

type ChannelPublishQueueItem {
  queueItemId: ID!
  channelId: ID!
  jobId: ID!
  """
  채널별 제작·배포 아이템 id. 현재는 jobId와 동일(점진적 마이그레이션).
  """
  channelContentItemId: ID!
  status: ChannelPublishQueueItemStatus!
  priority: Int!
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
  scheduledAt: AWSDateTime
  publishedAt: AWSDateTime
  note: String
  enqueuedBy: String
  """
  큐 적재 시 생성된 플랫폼별 발행 타깃(레거시 행은 빈 배열).
  """
  publishTargets: [PublishTarget!]!
}

type ChannelPublishQueueConnection {
  items: [ChannelPublishQueueItem!]!
  nextToken: String
}

input EnqueueToChannelPublishQueueInput {
  contentId: ID!
  jobId: ID!
  note: String
}

