schema {
  query: Query
  mutation: Mutation
}

type Query {
  """
  등록된 콘텐츠(=채널) 목록
  """
  adminContents(limit: Int, nextToken: String): ContentConnection!
  adminJobs(
    status: JobStatus
    """
    특정 채널(contentId) 하위 제작 아이템만 조회(cnt_… 또는 레거시 식별자).
    생략하고 status 도 생략하면 전체 상태를 병합해 최근 수정 순으로 반환한다.
    """
    contentId: String
    limit: Int
    nextToken: String
  ): AdminJobConnection!
  adminJob(jobId: ID!): AdminJob
  jobTimeline(jobId: ID!): [JobTimelineItem!]!
  """
  파이프라인 단계 실행 이력(토픽 플랜·씬 JSON·에셋 생성 등). Dynamo `EXEC#` 아이템.
  """
  jobExecutions(jobId: ID!): [PipelineExecution!]!
  jobDraft(jobId: ID!): JobDraftDetail
  contentPresets(includeInactive: Boolean): [ContentPreset!]!
  llmSettings: LlmSettings!
  voiceProfiles: [VoiceProfile!]!
  assetPoolAssets(
    assetType: AssetPoolAssetType
    sourceType: AssetPoolSourceType
    reviewStatus: AssetPoolReviewStatus
    tags: [String!]
    limit: Int
    nextToken: String
  ): AssetPoolAssetConnection!
}

type Mutation {
  requestUpload(input: RequestUploadInput!): UploadRequestResult!
  requestAssetUpload(input: RequestAssetUploadInput!): AssetUploadRequest!
  updateLlmStepSettings(input: UpdateLlmStepSettingsInput!): LlmStepSettings!
  upsertContentPreset(input: UpsertContentPresetInput!): ContentPreset!
  deleteContentPreset(presetId: ID!): DeleteContentPresetResult!
  upsertVoiceProfile(input: UpsertVoiceProfileInput!): VoiceProfile!
  createContent(input: CreateContentInput!): Content!
  updateContent(input: UpdateContentInput!): Content!
  deleteContent(contentId: ID!): DeleteContentResult!
  createDraftJob(input: CreateDraftJobInput!): AdminJob!
  attachJobToContent(input: AttachJobToContentInput!): AdminJob!
  updateJobBrief(input: UpdateJobBriefInput!): JobBrief!
  """
  잡 플랜 생성. 목표: 비동기 워크플로·Execution 레코드 기준(문서 `implementation-overview-external-review`).
  현재는 Resolver가 완료까지 동기 대기할 수 있음.
  """
  runJobPlan(input: RunJobPlanInput!): AdminJob!
  """
  씬 JSON 생성. 목표: 채택 스냅샷 입력·비동기 실행·상태 폴링.
  """
  runSceneJson(input: RunSceneJsonInput!): AdminJob!
  updateSceneJson(input: UpdateSceneJsonInput!): JobDraftDetail!
  """
  에셋 생성(팬아웃·큐 워커). 목표: 단계·씬 단위 부분 재실행.
  """
  runAssetGeneration(input: RunAssetGenerationInput!): AdminJob!
  searchSceneStockAssets(input: SearchSceneStockAssetsInput!): JobDraftDetail!
  selectSceneImageCandidate(
    input: SelectSceneImageCandidateInput!
  ): JobDraftDetail!
  selectSceneVideoCandidate(
    input: SelectSceneVideoCandidateInput!
  ): JobDraftDetail!
  selectSceneVoiceCandidate(
    input: SelectSceneVoiceCandidateInput!
  ): JobDraftDetail!
  setJobDefaultVoiceProfile(
    input: SetJobDefaultVoiceProfileInput!
  ): JobDraftDetail!
  setJobBackgroundMusic(input: SetJobBackgroundMusicInput!): JobDraftDetail!
  setSceneVoiceProfile(input: SetSceneVoiceProfileInput!): JobDraftDetail!
  """
  씬 에셋을 검증하고 render plan + final composition(Shotstack)를 실행한다.
  """
  runFinalComposition(input: RunFinalCompositionInput!): AdminJob!
  cancelFinalComposition(input: CancelFinalCompositionInput!): AdminJob!
  selectRenderArtifact(input: SelectRenderArtifactInput!): JobDraftDetail!
  """
  성공한 파이프라인 실행을 해당 단계의 채택본(승인 라인)으로 기록한다. 다음 단계 자동화는 추후 이 포인터를 소비하도록 확장한다.
  """
  approvePipelineExecution(input: ApprovePipelineExecutionInput!): AdminJob!
  deleteJob(jobId: ID!): DeleteJobResult!
  registerAssetPoolAsset(input: RegisterAssetPoolAssetInput!): AssetPoolAsset!
}

