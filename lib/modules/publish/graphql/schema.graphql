type JobBrief {
  contentId: String!
  presetId: String
  targetLanguage: String!
  titleIdea: String!
  targetDurationSec: Int!
  stylePreset: String!
  """
  자유 서술 기획 메모. Scene JSON 생성 시 프롬프트에 반영된다.
  """
  creativeBrief: String
  """
  YouTube 업로드 제목. 비어 있으면 `videoTitle`(메타) / Scene JSON 제목 흐름을 따른다.
  Scene JSON·내레이션 요약으로 LLM 생성 후 저장하는 용도.
  """
  youtubePublishTitle: String
  """
  YouTube 설명. LLM 제안 시 본문 다음 빈 줄 뒤 `#키워드` 형태의 해시태그 줄을 포함한다.
  """
  youtubePublishDescription: String
  """
  @deprecated 키워드는 설명 끝 해시태그로만 쓴다. 하위 호환용 필드(미사용 시 null 또는 빈 목록).
  """
  youtubePublishTags: [String!]
  youtubePublishCategoryId: Int
  youtubePublishDefaultLanguage: String
  presetSnapshot: PresetSnapshot
  resolvedPolicy: ResolvedPolicy
  renderSettings: RenderSettings
}

"""
LLM 제안 전용. 저장하려면 응답을 폼에 반영한 뒤 `updateJobBrief`를 호출한다.
"""
type JobYoutubePublishMetadataSuggestion {
  youtubePublishTitle: String
  youtubePublishDescription: String
  """
  @deprecated 항상 빈 목록. 키워드는 `youtubePublishDescription` 끝 해시태그만 사용한다. 클라이언트 쿼리 호환용 필드.
  """
  youtubePublishTags: [String!]
  youtubePublishCategoryId: Int
  youtubePublishDefaultLanguage: String
}

