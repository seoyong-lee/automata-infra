# Admin GraphQL — codegen/클라이언트는 이 파일을 경로로 직접 참조하거나 `cp`로 복사하세요.
# 메일·슬랙·포맷터에 붙였다가 다시 복사하면 타입명이 줄 중간에서 끊어져
# (예: ContentPresetPromptOverridesInput → ContentPresetPromptOverrid + esInput) 파싱이 깨집니다.

schema {
  query: Query
  mutation: Mutation
}

type Query {
  """
  등록된 콘텐츠(=채널) 목록
  """
  adminContents(limit: Int, nextToken: String): ContentConnection!
  adminJobs(
    status: JobStatus
    """
    특정 채널(contentId) 하위 제작 아이템만 조회(cnt_… 또는 레거시 식별자).
    생략하고 status 도 생략하면 전체 상태를 병합해 최근 수정 순으로 반환한다.
    """
    contentId: String
    limit: Int
    nextToken: String
  ): AdminJobConnection!
  adminJob(jobId: ID!): AdminJob
  jobTimeline(jobId: ID!): [JobTimelineItem!]!
  """
  파이프라인 단계 실행 이력(토픽 플랜·씬 JSON·에셋 생성 등). Dynamo `EXEC#` 아이템.
  """
  jobExecutions(jobId: ID!): [PipelineExecution!]!
  jobDraft(jobId: ID!): JobDraftDetail
  contentPresets(includeInactive: Boolean): [ContentPreset!]!
  llmSettings: LlmSettings!
  voiceProfiles: [VoiceProfile!]!
  """
  에셋 풀(이미지·영상·공유 BGM). 공유 배경음은 assetType: audio, storageKey는 library/bgm/…
  """
  assetPoolAssets(
    assetType: AssetPoolAssetType
    sourceType: AssetPoolSourceType
    reviewStatus: AssetPoolReviewStatus
    tags: [String!]
    limit: Int
    nextToken: String
  ): AssetPoolAssetConnection!
  getTranscript(transcriptId: ID!): VideoTranscriptRecord!
  """
  Secrets Manager의 YouTube OAuth JSON으로 `channels.list(mine:true)`를 호출해,
  해당 토큰이 접근할 수 있는 채널 목록을 반환한다 (다중 페이지 병합).
  """
  listYoutubeChannelsForSecret(
    input: ListYoutubeChannelsForSecretInput!
  ): [YoutubeChannelForSecret!]!
  """
  채널(contentId) 하위 잡 중 출고 대기 단계만 반환한다. 잡 메타 상태로부터 파생한다.
  """
  channelPublishQueue(
    contentId: ID!
    limit: Int
  ): ChannelPublishQueueConnection!
}

type Mutation {
  requestUpload(input: RequestUploadInput!): UploadRequestResult!
  requestAssetUpload(input: RequestAssetUploadInput!): AssetUploadRequest!
  requestTranscriptUpload(
    input: RequestTranscriptUploadInput!
  ): TranscriptUploadRequest!
  createVideoTranscriptFromUpload(
    input: CreateVideoTranscriptFromUploadInput!
  ): VideoTranscriptRecord!
  createVideoTranscriptFromYoutube(
    input: CreateVideoTranscriptFromYoutubeInput!
  ): VideoTranscriptRecord!
  """
  SCENE_IMAGE용 presigned PUT 완료 후 호출한다. Dynamo 씬 행의 imageS3Key를 갱신한다.
  """
  completeSceneImageUpload(
    input: CompleteSceneImageUploadInput!
  ): JobDraftDetail!
  completeSceneVideoUpload(
    input: CompleteSceneVideoUploadInput!
  ): JobDraftDetail!
  extractYoutubeTranscript(
    input: ExtractYoutubeTranscriptInput!
  ): JobDraftDetail!
  updateLlmStepSettings(input: UpdateLlmStepSettingsInput!): LlmStepSettings!
  upsertContentPreset(input: UpsertContentPresetInput!): ContentPreset!
  """
  잡에 저장된 렌더 옵션(또는 resolvedPolicy 기본)을 병합해 지정 콘텐츠 프리셋의 defaultPolicy.renderSettings에 반영한다.
  다음 잡부터 같은 프리셋으로 생성 시 해당 레이아웃이 기본값으로 쓰인다.
  """
  pushJobRenderSettingsToContentPreset(
    input: PushJobRenderSettingsToContentPresetInput!
  ): ContentPreset!
  deleteContentPreset(presetId: ID!): DeleteContentPresetResult!
  upsertVoiceProfile(input: UpsertVoiceProfileInput!): VoiceProfile!
  createContent(input: CreateContentInput!): Content!
  updateContent(input: UpdateContentInput!): Content!
  """
  YouTube Data API v3 `channels.list(mine:true)`로 채널 스냅샷을 가져와 Dynamo 콘텐츠(채널) 행에 저장한다.
  OAuth 스코프에 `youtube.readonly` 이상이 필요하다.
  """
  syncYoutubeChannelMetadata(input: SyncYoutubeChannelMetadataInput!): Content!
  """
  `channels.update`(snippet·brandingSettings 병합)로 Google 측 채널 메타를 갱신한 뒤 로컬 스냅샷을 다시 동기화한다.
  `youtube` 스코프(쓰기)가 필요하다.
  """
  pushYoutubeChannelToGoogle(input: PushYoutubeChannelToGoogleInput!): Content!
  deleteContent(contentId: ID!): DeleteContentResult!
  createDraftJob(input: CreateDraftJobInput!): AdminJob!
  attachJobToContent(input: AttachJobToContentInput!): AdminJob!
  updateJobBrief(input: UpdateJobBriefInput!): JobBrief!
  """
  잡·씬·채널 컨텍스트로 YouTube 업로드 메타(제목·설명·카테고리·기본 언어)를 LLM이 제안한다. 검색용 키워드는 설명 끝 해시태그 줄에 포함된다. 저장하지 않는다.
  """
  suggestJobYoutubePublishMetadata(
    input: SuggestJobYoutubePublishMetadataInput!
  ): JobYoutubePublishMetadataSuggestion!
  """
  잡 플랜 생성. 목표: 비동기 워크플로·Execution 레코드 기준(문서 `implementation-overview-external-review`).
  현재는 Resolver가 완료까지 동기 대기할 수 있음.
  """
  runJobPlan(input: RunJobPlanInput!): AdminJob!
  """
  씬 JSON 생성. 목표: 채택 스냅샷 입력·비동기 실행·상태 폴링.
  """
  runSceneJson(input: RunSceneJsonInput!): AdminJob!
  updateSceneJson(input: UpdateSceneJsonInput!): JobDraftDetail!
  """
  에셋 생성(팬아웃·큐 워커). 목표: 단계·씬 단위 부분 재실행.
  """
  runAssetGeneration(input: RunAssetGenerationInput!): AdminJob!
  searchSceneStockAssets(input: SearchSceneStockAssetsInput!): JobDraftDetail!
  selectSceneImageCandidate(
    input: SelectSceneImageCandidateInput!
  ): JobDraftDetail!
  selectSceneVideoCandidate(
    input: SelectSceneVideoCandidateInput!
  ): JobDraftDetail!
  """
  씬에 연결된 영상(클립·선택 후보·트랜스크립트 메타)을 해제한다. 잡 S3 경로(assets|logs/{jobId}/) 객체는 best-effort 삭제.
  """
  clearSceneVideo(input: ClearSceneVideoInput!): JobDraftDetail!
  selectSceneVoiceCandidate(
    input: SelectSceneVoiceCandidateInput!
  ): JobDraftDetail!
  setJobDefaultVoiceProfile(
    input: SetJobDefaultVoiceProfileInput!
  ): JobDraftDetail!
  setJobBackgroundMusic(input: SetJobBackgroundMusicInput!): JobDraftDetail!
  """
  잡 전체 단일 B-roll 영상. 렌더 시 씬 타임라인 [startSec,endSec] 구간만 잘라 쓰고, 씬별 음성·자막은 기존과 동일.
  """
  setJobMasterVideo(input: SetJobMasterVideoInput!): JobDraftDetail!
  """
  소스 영상에서 대표 프레임을 추출해 S3에 저장한다 (Vision·쇼츠 대본 파이프라인 1단계).
  `sourceVideoS3Key` 생략 시 잡의 `masterVideoS3Key`를 사용한다. 기존 JOB_PLAN~합성 플로우와 독립.
  Fargate는 별도 워커 Lambda에서 실행되며, 이 뮤테이션은 즉시 큐잉 결과를 반환한다(AppSync 동기 한도와 무관).
  완료·프레임 목록은 `jobDraft`/`adminJob`의 `sourceVideoFrameExtractStatus`와 S3 `insightResultS3Key` JSON을 본다.
  """
  runSourceVideoFrameExtract(
    input: RunSourceVideoFrameExtractInput!
  ): SourceVideoFrameExtractQueued!
  """
  `runSourceVideoFrameExtract` 결과(S3 JSON)와 잡 플랜을 바탕으로 씬 JSON을 생성·저장한다.
  Vision: 기본 AUTO는 `GEMINI_VISION_SECRET_ID`가 있으면 Gemini 2.5 Flash-Lite(저비용), 없으면 Bedrock(씬 JSON 모델) 멀티모달.
  `visionProvider`로 강제할 수 있다. 이후 기존 scene-json LLM 스텝에 컨텍스트를 합친다.
  `skipVision: true`면 S3 키·타임스탬프만 전달한다.
  성공 시 기본으로 `jobs/…/source-video-insight/frames/*.jpg`만 삭제하고 `frame-extract-result.json`은 offset 요약 + `frameJpegsPurgedAt`만 남긴다.
  `retainFrameJpegs: true`면 JPEG을 남긴다.
  """
  runSourceVideoSceneJson(input: RunSourceVideoSceneJsonInput!): AdminJob!
  setSceneVoiceProfile(input: SetSceneVoiceProfileInput!): JobDraftDetail!
  """
  씬 에셋을 검증하고 render plan + final composition(Shotstack)를 실행한다.
  """
  runFinalComposition(input: RunFinalCompositionInput!): AdminJob!
  cancelFinalComposition(input: CancelFinalCompositionInput!): AdminJob!
  selectRenderArtifact(input: SelectRenderArtifactInput!): JobDraftDetail!
  """
  성공한 파이프라인 실행을 해당 단계의 채택본(승인 라인)으로 기록한다. 다음 단계 자동화는 추후 이 포인터를 소비하도록 확장한다.
  """
  approvePipelineExecution(input: ApprovePipelineExecutionInput!): AdminJob!
  deleteJob(jobId: ID!): DeleteJobResult!
  registerAssetPoolAsset(input: RegisterAssetPoolAssetInput!): AssetPoolAsset!
  """
  공유 BGM 라이브러리(library/bgm/) presigned PUT. 완료 후 registerAssetPoolAsset(assetType: audio, storageKey)로 등록한다.
  """
  requestLibraryBgmUpload(
    input: RequestLibraryBgmUploadInput!
  ): LibraryBgmUploadRequest!
}

type AdminJob {
  jobId: ID!
  contentId: ID
  status: JobStatus!
  contentType: String
