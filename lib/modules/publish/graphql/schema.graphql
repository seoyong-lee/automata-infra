schema {
  query: Query
  mutation: Mutation
}

type Query {
  """
  등록된 콘텐츠(=채널) 목록
  """
  adminContents(limit: Int, nextToken: String): ContentConnection!
  adminJobs(
    status: JobStatus
    """
    특정 채널(contentId) 하위 제작 아이템만 조회(cnt_… 또는 레거시 식별자).
    생략하고 status 도 생략하면 전체 상태를 병합해 최근 수정 순으로 반환한다.
    """
    contentId: String
    limit: Int
    nextToken: String
  ): AdminJobConnection!
  adminJob(jobId: ID!): AdminJob
  pendingReviews(limit: Int, nextToken: String): AdminReviewTaskConnection!
  jobTimeline(jobId: ID!): [JobTimelineItem!]!
  """
  파이프라인 단계 실행 이력(토픽 플랜·씬 JSON·에셋 생성 등). Dynamo `EXEC#` 아이템.
  """
  jobExecutions(jobId: ID!): [PipelineExecution!]!
  jobDraft(jobId: ID!): JobDraftDetail
  llmSettings: LlmSettings!
  """
  채널(콘텐츠)별 출고 대기 큐. 제작 완료 후 편성·예약 발행 전 단계.
  필드는 null 허용(리졸버 미배포·일시 실패 시) — 클라이언트는 빈 배열로 처리.
  """
  channelPublishQueue(contentId: ID!): [ChannelPublishQueueItem!]
}

type Mutation {
  submitReviewDecision(input: SubmitReviewDecisionInput!): ReviewDecisionResult!
  requestUpload(input: RequestUploadInput!): UploadRequestResult!
  updateLlmStepSettings(input: UpdateLlmStepSettingsInput!): LlmStepSettings!
  createContent(input: CreateContentInput!): Content!
  updateContent(input: UpdateContentInput!): Content!
  deleteContent(contentId: ID!): DeleteContentResult!
  createDraftJob(input: CreateDraftJobInput!): AdminJob!
  attachJobToContent(input: AttachJobToContentInput!): AdminJob!
  updateTopicSeed(input: UpdateTopicSeedInput!): TopicSeed!
  """
  토픽 플랜 생성. 목표: 비동기 워크플로·Execution 레코드 기준(문서 `implementation-overview-external-review`).
  현재는 Resolver가 완료까지 동기 대기할 수 있음.
  """
  runTopicPlan(input: RunTopicPlanInput!): AdminJob!
  """
  씬 JSON 생성. 목표: 채택 스냅샷 입력·비동기 실행·상태 폴링.
  """
  runSceneJson(input: RunSceneJsonInput!): AdminJob!
  updateSceneJson(input: UpdateSceneJsonInput!): JobDraftDetail!
  """
  에셋 생성(팬아웃·큐 워커). 목표: 단계·씬 단위 부분 재실행.
  """
  runAssetGeneration(input: RunAssetGenerationInput!): AdminJob!
  """
  성공한 파이프라인 실행을 해당 단계의 채택본(승인 라인)으로 기록한다. 다음 단계 자동화는 추후 이 포인터를 소비하도록 확장한다.
  """
  approvePipelineExecution(input: ApprovePipelineExecutionInput!): AdminJob!
  """
  제작 아이템을 채널 출고 큐에 넣고, 잡 상태를 READY_TO_SCHEDULE 로 맞춘다.
  """
  enqueueToChannelPublishQueue(
    input: EnqueueToChannelPublishQueueInput!
  ): ChannelPublishQueueItem!
  deleteJob(jobId: ID!): DeleteJobResult!
}

type AdminJob {
  jobId: ID!
  contentId: ID
  topicId: String!
  status: JobStatus!
  contentType: String
  variant: String
  autoPublish: Boolean
  publishAt: AWSDateTime
  language: String!
  targetDurationSec: Int!
  videoTitle: String!
  retryCount: Int!
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
  sceneJsonS3Key: String
  renderPlanS3Key: String
  finalVideoS3Key: String
  thumbnailS3Key: String
  previewS3Key: String
  reviewAction: ReviewAction
  reviewRequestedAt: AWSDateTime
  uploadStatus: UploadStatus
  uploadVideoId: String
  contentBriefS3Key: String
  topicSeedS3Key: String
  topicS3Key: String
  approvedTopicExecutionId: String
  approvedSceneExecutionId: String
  approvedAssetExecutionId: String
}

type ContentBriefSeed {
  date: AWSDate!
  fortuneType: String!
  audience: String!
  style: String!
  tone: String!
  topicKey: String!
}

type ContentBriefConstraints {
  maxScenes: Int!
  mustHaveHook: Boolean!
  mustHaveCTA: Boolean!
  safetyLevel: String!
  noMedicalOrLegalClaims: Boolean!
}

type ContentBrief {
  jobId: ID!
  contentType: String!
  variant: String!
  contentId: String!
  language: String!
  targetPlatform: String!
  targetDurationSec: Int!
  titleIdea: String!
  stylePreset: String!
  autoPublish: Boolean
  publishAt: AWSDateTime
  seed: ContentBriefSeed!
  constraints: ContentBriefConstraints!
}

type TopicSeed {
  contentId: String!
  targetLanguage: String!
  titleIdea: String!
  targetDurationSec: Int!
  stylePreset: String!
  """
  자유 서술 기획 메모. Scene JSON 생성 시 프롬프트에 반영된다.
  """
  creativeBrief: String
}

type SceneJsonScene {
  sceneId: Int!
  durationSec: Int!
  narration: String!
  imagePrompt: String!
  videoPrompt: String
  subtitle: String!
  bgmMood: String
  sfx: [String!]
}

type SceneJsonPayload {
  videoTitle: String!
  language: String!
  scenes: [SceneJsonScene!]!
}

type SceneAsset {
  sceneId: Int!
  imageS3Key: String
  videoClipS3Key: String
  voiceS3Key: String
  durationSec: Int
  narration: String
  subtitle: String
  imagePrompt: String
  videoPrompt: String
  validationStatus: String
}

type JobDraftDetail {
  job: AdminJob!
  contentBrief: ContentBrief
  topicSeed: TopicSeed
  topicPlan: TopicSeed
  sceneJson: SceneJsonPayload
  assets: [SceneAsset!]!
}

type AdminReviewTask {
  jobId: ID!
  previewS3Key: String
  reviewRequestedAt: AWSDateTime
  reviewAction: ReviewAction
  status: JobStatus!
}

type AdminJobConnection {
  items: [AdminJob!]!
  nextToken: String
}

type AdminReviewTaskConnection {
  items: [AdminReviewTask!]!
  nextToken: String
}

type JobTimelineItem {
  pk: String!
  sk: String!
  data: AWSJSON!
}

enum PipelineStageType {
  TOPIC_PLAN
  SCENE_JSON
  ASSET_GENERATION
}

enum ExecutionStatus {
  QUEUED
  RUNNING
  SUCCEEDED
  FAILED
}

type PipelineExecution {
  executionId: ID!
  jobId: ID!
  stageType: PipelineStageType!
  status: ExecutionStatus!
  triggeredBy: String
  startedAt: AWSDateTime!
  completedAt: AWSDateTime
  errorMessage: String
  """
  해당 실행의 입력 기준. 현재는 단계별 입력 S3 키(시드·토픽 플랜·씬 JSON 등). 승인 스냅샷 ID로 확장 가능.
  """
  inputSnapshotId: String
  """
  성공 시 산출물 S3 키(토픽·씬 JSON 등).
  """
  outputArtifactS3Key: String
}

input ApprovePipelineExecutionInput {
  jobId: ID!
  executionId: ID!
}

type LlmSettings {
  items: [LlmStepSettings!]!
}

type Content {
  contentId: ID!
  label: String!
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
  youtubeSecretName: String
  youtubeAccountType: String
  autoPublishEnabled: Boolean
  defaultVisibility: String
  defaultCategoryId: Int
  playlistId: String
  youtubeUpdatedAt: AWSDateTime
  youtubeUpdatedBy: String
}

type ContentConnection {
  items: [Content!]!
  nextToken: String
}

type DeleteContentResult {
  ok: Boolean!
  contentId: ID!
}

type DeleteJobResult {
  ok: Boolean!
  jobId: ID!
}

type LlmStepSettings {
  stepKey: String!
  provider: LlmProvider!
  model: String!
  temperature: Float!
  maxOutputTokens: Int
  secretIdEnvVar: String!
  promptVersion: String!
  systemPrompt: String!
  userPrompt: String!
  updatedAt: AWSDateTime!
  updatedBy: String!
}

input SubmitReviewDecisionInput {
  jobId: ID!
  action: ReviewDecisionAction!
  regenerationScope: String
}

type ReviewDecisionResult {
  ok: Boolean!
  jobId: ID!
  action: ReviewAction!
  regenerationScope: String
  status: ReviewDecisionStatus!
}

input RequestUploadInput {
  jobId: ID!
}

input UpdateLlmStepSettingsInput {
  stepKey: String!
  provider: LlmProvider!
  model: String!
  temperature: Float!
  maxOutputTokens: Int
  secretIdEnvVar: String!
  promptVersion: String!
  systemPrompt: String!
  userPrompt: String!
}

input CreateContentInput {
  label: String!
  youtubeSecretName: String
  youtubeAccountType: String
  autoPublishEnabled: Boolean
  defaultVisibility: String
  defaultCategoryId: Int
  playlistId: String
}

input UpdateContentInput {
  contentId: ID!
  label: String
  youtubeSecretName: String
  youtubeAccountType: String
  autoPublishEnabled: Boolean
  defaultVisibility: String
  defaultCategoryId: Int
  playlistId: String
  clearYoutubePublish: Boolean
}

input CreateDraftJobInput {
  """
  생략 시 미연결 잡으로 생성된다.
  """
  contentId: ID
  targetLanguage: String!
  titleIdea: String!
  targetDurationSec: Int!
  stylePreset: String!
  creativeBrief: String
  autoPublish: Boolean
  publishAt: AWSDateTime
  """
  false가 아니면 생성 직후 토픽 플랜까지 실행한다. 생략 시 true.
  """
  runTopicPlan: Boolean
}

input AttachJobToContentInput {
  jobId: ID!
  contentId: ID!
}

input UpdateTopicSeedInput {
  jobId: ID!
  contentId: String!
  targetLanguage: String!
  titleIdea: String!
  targetDurationSec: Int!
  stylePreset: String!
  creativeBrief: String
}

input RunTopicPlanInput {
  jobId: ID!
}

input RunSceneJsonInput {
  jobId: ID!
}

input UpdateSceneJsonInput {
  jobId: ID!
  sceneJson: AWSJSON!
}

input RunAssetGenerationInput {
  jobId: ID!
}

type UploadRequestResult {
  ok: Boolean!
  jobId: ID!
  status: JobStatus!
  platform: UploadPlatform!
}

enum JobStatus {
  DRAFT
  PLANNING
  PLANNED
  SCENE_JSON_BUILDING
  SCENE_JSON_READY
  ASSET_GENERATING
  ASSETS_READY
  VALIDATING
  RENDER_PLAN_READY
  RENDERED
  REVIEW_PENDING
  APPROVED
  REJECTED
  """
  제작·검수 완료 후 채널 출고 큐에 올릴 수 있는 상태.
  """
  READY_TO_SCHEDULE
  UPLOAD_QUEUED
  UPLOADED
  FAILED
  METRICS_COLLECTED
}

enum ChannelPublishQueueItemStatus {
  QUEUED
  SCHEDULED
  PUBLISHED
  REMOVED
}

type ChannelPublishQueueItem {
  queueItemId: ID!
  channelId: ID!
  jobId: ID!
  status: ChannelPublishQueueItemStatus!
  priority: Int!
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
  scheduledAt: AWSDateTime
  publishedAt: AWSDateTime
  note: String
  enqueuedBy: String
}

input EnqueueToChannelPublishQueueInput {
  contentId: ID!
  jobId: ID!
  note: String
}

enum ReviewAction {
  PENDING
  APPROVE
  REJECT
  REGENERATE
}

enum ReviewDecisionAction {
  APPROVE
  REJECT
  REGENERATE
}

enum ReviewDecisionStatus {
  REVIEW_DECISION_RECORDED
}

enum UploadStatus {
  QUEUED
  UPLOADED
}

enum UploadPlatform {
  YOUTUBE
}

enum LlmProvider {
  OPENAI
  GEMINI
  BEDROCK
}
