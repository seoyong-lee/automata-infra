schema {
  query: Query
  mutation: Mutation
}

type Query {
  adminJobs(
    status: JobStatus
    channelId: String
    limit: Int
    nextToken: String
  ): AdminJobConnection!
  adminJob(jobId: ID!): AdminJob
  pendingReviews(limit: Int, nextToken: String): AdminReviewTaskConnection!
  jobTimeline(jobId: ID!): [JobTimelineItem!]!
  jobDraft(jobId: ID!): JobDraftDetail
  llmSettings: LlmSettings!
}

type Mutation {
  submitReviewDecision(input: SubmitReviewDecisionInput!): ReviewDecisionResult!
  requestUpload(input: RequestUploadInput!): UploadRequestResult!
  updateLlmStepSettings(input: UpdateLlmStepSettingsInput!): LlmStepSettings!
  createDraftJob(input: CreateDraftJobInput!): AdminJob!
  updateTopicSeed(input: UpdateTopicSeedInput!): TopicSeed!
  runTopicPlan(input: RunTopicPlanInput!): AdminJob!
  runSceneJson(input: RunSceneJsonInput!): AdminJob!
  updateSceneJson(input: UpdateSceneJsonInput!): JobDraftDetail!
  runAssetGeneration(input: RunAssetGenerationInput!): AdminJob!
}

type AdminJob {
  jobId: ID!
  channelId: String!
  topicId: String!
  status: JobStatus!
  contentType: String
  variant: String
  autoPublish: Boolean
  publishAt: AWSDateTime
  language: String!
  targetDurationSec: Int!
  videoTitle: String!
  retryCount: Int!
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
  sceneJsonS3Key: String
  renderPlanS3Key: String
  finalVideoS3Key: String
  thumbnailS3Key: String
  previewS3Key: String
  reviewAction: ReviewAction
  reviewRequestedAt: AWSDateTime
  uploadStatus: UploadStatus
  uploadVideoId: String
  contentBriefS3Key: String
  topicSeedS3Key: String
  topicS3Key: String
}

type ContentBriefSeed {
  date: AWSDate!
  fortuneType: String!
  audience: String!
  style: String!
  tone: String!
  topicKey: String!
}

type ContentBriefConstraints {
  maxScenes: Int!
  mustHaveHook: Boolean!
  mustHaveCTA: Boolean!
  safetyLevel: String!
  noMedicalOrLegalClaims: Boolean!
}

type ContentBrief {
  jobId: ID!
  contentType: String!
  variant: String!
  channelId: String!
  language: String!
  targetPlatform: String!
  targetDurationSec: Int!
  titleIdea: String!
  stylePreset: String!
  autoPublish: Boolean
  publishAt: AWSDateTime
  seed: ContentBriefSeed!
  constraints: ContentBriefConstraints!
}

type TopicSeed {
  channelId: String!
  targetLanguage: String!
  titleIdea: String!
  targetDurationSec: Int!
  stylePreset: String!
}

type SceneJsonScene {
  sceneId: Int!
  durationSec: Int!
  narration: String!
  imagePrompt: String!
  videoPrompt: String
  subtitle: String!
  bgmMood: String
  sfx: [String!]
}

type SceneJsonPayload {
  videoTitle: String!
  language: String!
  scenes: [SceneJsonScene!]!
}

type SceneAsset {
  sceneId: Int!
  imageS3Key: String
  videoClipS3Key: String
  voiceS3Key: String
  durationSec: Int
  narration: String
  subtitle: String
  imagePrompt: String
  videoPrompt: String
  validationStatus: String
}

type JobDraftDetail {
  job: AdminJob!
  contentBrief: ContentBrief
  topicSeed: TopicSeed
  topicPlan: TopicSeed
  sceneJson: SceneJsonPayload
  assets: [SceneAsset!]!
}

type AdminReviewTask {
  jobId: ID!
  previewS3Key: String
  reviewRequestedAt: AWSDateTime
  reviewAction: ReviewAction
  status: JobStatus!
}

type AdminJobConnection {
  items: [AdminJob!]!
  nextToken: String
}

type AdminReviewTaskConnection {
  items: [AdminReviewTask!]!
  nextToken: String
}

type JobTimelineItem {
  pk: String!
  sk: String!
  data: AWSJSON!
}

type LlmSettings {
  items: [LlmStepSettings!]!
}

type LlmStepSettings {
  stepKey: String!
  provider: LlmProvider!
  model: String!
  temperature: Float!
  maxOutputTokens: Int
  secretIdEnvVar: String!
  promptVersion: String!
  systemPrompt: String!
  userPrompt: String!
  updatedAt: AWSDateTime!
  updatedBy: String!
}

input SubmitReviewDecisionInput {
  jobId: ID!
  action: ReviewDecisionAction!
  regenerationScope: String
}

type ReviewDecisionResult {
  ok: Boolean!
  jobId: ID!
  action: ReviewAction!
  regenerationScope: String
  status: ReviewDecisionStatus!
}

input RequestUploadInput {
  jobId: ID!
}

input UpdateLlmStepSettingsInput {
  stepKey: String!
  provider: LlmProvider!
  model: String!
  temperature: Float!
  maxOutputTokens: Int
  secretIdEnvVar: String!
  promptVersion: String!
  systemPrompt: String!
  userPrompt: String!
}

input CreateDraftJobInput {
  channelId: String!
  targetLanguage: String!
  contentType: String!
  variant: String!
  titleIdea: String!
  targetDurationSec: Int!
  stylePreset: String!
  autoPublish: Boolean
  publishAt: AWSDateTime
}

input UpdateTopicSeedInput {
  jobId: ID!
  channelId: String!
  targetLanguage: String!
  titleIdea: String!
  targetDurationSec: Int!
  stylePreset: String!
}

input RunTopicPlanInput {
  jobId: ID!
}

input RunSceneJsonInput {
  jobId: ID!
}

input UpdateSceneJsonInput {
  jobId: ID!
  sceneJson: AWSJSON!
}

input RunAssetGenerationInput {
  jobId: ID!
}

type UploadRequestResult {
  ok: Boolean!
  jobId: ID!
  status: JobStatus!
  platform: UploadPlatform!
}

enum JobStatus {
  DRAFT
  PLANNING
  PLANNED
  SCENE_JSON_BUILDING
  SCENE_JSON_READY
  ASSET_GENERATING
  ASSETS_READY
  VALIDATING
  RENDER_PLAN_READY
  RENDERED
  REVIEW_PENDING
  APPROVED
  REJECTED
  UPLOAD_QUEUED
  UPLOADED
  FAILED
  METRICS_COLLECTED
}

enum ReviewAction {
  PENDING
  APPROVE
  REJECT
  REGENERATE
}

enum ReviewDecisionAction {
  APPROVE
  REJECT
  REGENERATE
}

enum ReviewDecisionStatus {
  REVIEW_DECISION_RECORDED
}

enum UploadStatus {
  QUEUED
  UPLOADED
}

enum UploadPlatform {
  YOUTUBE
}

enum LlmProvider {
  OPENAI
  GEMINI
  BEDROCK
}
