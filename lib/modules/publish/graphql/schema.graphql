  APPROVED
  REJECTED
  """
  제작·검수 완료 후 채널 출고 큐에 올릴 수 있는 상태.
  """
  READY_TO_SCHEDULE
  UPLOAD_QUEUED
  UPLOADED
  FAILED
  METRICS_COLLECTED
}

